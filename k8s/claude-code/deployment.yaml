apiVersion: apps/v1
kind: Deployment
metadata:
  name: claude-code
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: claude-code
  template:
    metadata:
      labels:
        app: claude-code
    spec:
      # Runs the whole pod inside a Kata Containers hardware VM, so the
      # dockerd sidecar's `privileged: true` is contained by the hypervisor
      # boundary instead of just Linux namespaces/capabilities.
      runtimeClassName: kata
      serviceAccountName: claude-code
      securityContext:
        fsGroup: 1000
        # docker:27-dind's dind entrypoint chowns docker.sock to its "docker"
        # group (GID 2375), overriding fsGroup's setgid inheritance, so the
        # claude-code container needs that GID explicitly to reach the socket.
        supplementalGroups: [2375]
      containers:
        - name: claude-code
          image: ${IMAGE}
          command: ["/usr/bin/bash", "-c"]
          args:
            # --continue can't be combined with --capacity/--spawn (confirmed
            # via a live failure), and worktree mode needs cwd to be a git
            # repo (this workspace dir isn't one). Simpler tradeoff: give up
            # automatic --continue on redeploy (it wasn't reliably resuming
            # conversation context across pod restarts anyway) in exchange
            # for same-dir mode supporting up to 32 concurrent claude.app
            # sessions in this one workspace directory.
            - "/usr/bin/claude remote-control --capacity=32"
          env:
            - name: DOCKER_HOST
              value: unix:///run/docker-sock/docker.sock
          # Without an explicit memory limit, Kata sizes the guest VM off
          # its own small default (~2GB) instead of the host's real
          # capacity, and --capacity=32 sessions OOMKilled the container
          # under that ceiling. 4Gi keeps it well clear.
          resources:
            requests:
              memory: 4Gi
            limits:
              memory: 4Gi
          volumeMounts:
            - name: home
              mountPath: /home/claude
            - name: docker-sock
              mountPath: /run/docker-sock
        - name: dockerd
          image: docker:27-dind
          # Only docker.sock needs to be shared with the claude-code
          # container, so it gets its own subdirectory instead of all of
          # /var/run. Sharing the whole of /var/run would also share
          # containerd's exec-root (pidfiles etc.), which lives on the
          # emptyDir and therefore survives container restarts within the
          # pod unlike the container's own rootfs — a stale pidfile left
          # behind by an unclean shutdown then makes the next start refuse
          # to run, thinking the old (reused) PID is still containerd.
          args:
            - --host=unix:///run/docker-sock/docker.sock
          securityContext:
            privileged: true
          volumeMounts:
            - name: docker-sock
              mountPath: /run/docker-sock
            # dockerd's default /var/lib/docker sits on the pod's own
            # virtiofs-backed rootfs, and overlay2 can't mount on top of
            # virtiofs ("invalid argument"), so dockerd falls back to the
            # vfs storage driver, which doesn't support xattrs and breaks
            # multi-stage `COPY --chown` builds. Moving the data root to a
            # tmpfs emptyDir lets overlay2 mount successfully instead.
            - name: docker-data
              mountPath: /var/lib/docker
      volumes:
        - name: home
          persistentVolumeClaim:
            claimName: claude-code-home
        - name: docker-sock
          emptyDir: {}
        - name: docker-data
          emptyDir:
            medium: Memory
            sizeLimit: 4Gi
